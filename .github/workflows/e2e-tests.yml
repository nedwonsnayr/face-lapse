name: E2E Tests

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Cache Python dependencies
        id: cache-python
        uses: actions/cache@v5
        with:
          path: .venv
          key: ${{ runner.os }}-python-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-python-${{ steps.setup-python.outputs.python-version }}-

      - name: Install Python dependencies
        if: steps.cache-python.outputs.cache-hit != 'true'
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -r backend/requirements.txt

      - name: Cache frontend dependencies
        id: cache-frontend
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      - name: Install frontend dependencies
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        run: |
          cd frontend
          npm ci

      - name: Cache E2E dependencies
        id: cache-e2e
        uses: actions/cache@v5
        with:
          path: e2e/node_modules
          key: ${{ runner.os }}-e2e-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-e2e-

      - name: Install E2E dependencies
        if: steps.cache-e2e.outputs.cache-hit != 'true'
        run: |
          cd e2e
          npm ci

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          cd e2e
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          cd e2e
          npx playwright test --config playwright.config.ts

      - name: Add E2E metrics to workflow summary
        if: always()
        run: |
          node -e '
          const fs = require("fs");
          const path = require("path");

          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const resultsPath = path.join(process.cwd(), "e2e", "test-results.json");

          const writeLines = (lines) => {
            fs.appendFileSync(summaryPath, lines.join("\n") + "\n");
          };

          if (!fs.existsSync(resultsPath)) {
            writeLines([
              "## Playwright E2E Results",
              "",
              "No `test-results.json` file was produced. Tests may have failed before the reporter could write output.",
            ]);
            process.exit(0);
          }

          const report = JSON.parse(fs.readFileSync(resultsPath, "utf8"));

          const totals = {
            passed: 0,
            failed: 0,
            skipped: 0,
            flaky: 0,
            timedOut: 0,
            interrupted: 0,
          };

          const durationsMs = [];

          const visitSuite = (suite) => {
            for (const spec of suite.specs || []) {
              for (const test of spec.tests || []) {
                const outcomes = new Set();
                for (const result of test.results || []) {
                  outcomes.add(result.status);
                  if (typeof result.duration === "number") {
                    durationsMs.push(result.duration);
                  }
                }

                if (outcomes.has("failed")) totals.failed += 1;
                else if (outcomes.has("timedOut")) totals.timedOut += 1;
                else if (outcomes.has("interrupted")) totals.interrupted += 1;
                else if (outcomes.has("skipped")) totals.skipped += 1;
                else if (outcomes.has("passed")) totals.passed += 1;

                if (test.outcome === "flaky") {
                  totals.flaky += 1;
                }
              }
            }
            for (const child of suite.suites || []) visitSuite(child);
          };

          for (const suite of report.suites || []) visitSuite(suite);

          const totalTests =
            totals.passed +
            totals.failed +
            totals.skipped +
            totals.timedOut +
            totals.interrupted;

          const totalDurationMs = durationsMs.reduce((sum, ms) => sum + ms, 0);
          const avgDurationMs = durationsMs.length
            ? Math.round(totalDurationMs / durationsMs.length)
            : 0;

          const toSeconds = (ms) => (ms / 1000).toFixed(2);

          writeLines([
            "## Playwright E2E Results",
            "",
            "| Metric | Value |",
            "|---|---:|",
            `| Total tests | ${totalTests} |`,
            `| Passed | ${totals.passed} |`,
            `| Failed | ${totals.failed} |`,
            `| Flaky | ${totals.flaky} |`,
            `| Skipped | ${totals.skipped} |`,
            `| Timed out | ${totals.timedOut} |`,
            `| Interrupted | ${totals.interrupted} |`,
            `| Total test runtime (s) | ${toSeconds(totalDurationMs)} |`,
            `| Average test runtime (ms) | ${avgDurationMs} |`,
          ]);
          '

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
          if-no-files-found: ignore