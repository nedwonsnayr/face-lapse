services:
  - type: web
    name: face-lapse-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: REQUIRE_AUTH
        value: true
      - key: USE_CLOUD_STORAGE
        value: true
      # Add other environment variables via Render dashboard:
      # - DATABASE_URL (PostgreSQL)
      # - R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET, R2_ENDPOINT, R2_PUBLIC_URL
      # - GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
      # - JWT_SECRET_KEY
      # - CORS_ORIGINS
